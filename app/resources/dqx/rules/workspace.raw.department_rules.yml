# The reference_tables are then utilized in your checks configuration
checks:
  - criticality: error
    check:
      function: is_not_null_and_not_empty
      arguments:
        column: dept_id
  #
  - criticality: warn
    check:
      function: is_in_range
      arguments:
        column: age
        min_limit: 0
        max_limit: 120

  #    
  - criticality: error
    check:
      function: is_not_null
      arguments:
        column: dept_id
        trim_strings: true
  #        
  - criticality: warn
    check:
      function: is_not_empty
      arguments:
        column: dept_id
        trim_strings: true        